<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | Resume Portal</title>
    <style>
        /* Base Styles & Modern Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 23px rgba(0, 0, 0, 0.05);
        }

        /* Header Section */
        header {
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 25px;
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: #1a365d;
            margin-bottom: 5px;
        }

        header p {
            font-size: 1.1rem;
            color: #4a5568;
            font-weight: 500;
        }

        .contact-info {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: #718096;
        }

        .contact-info a {
            color: #3182ce;
            text-decoration: none;
            transition: color 0.2s;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        /* Section Styling */
        section {
            margin-bottom: 35px;
        }

        h2 {
            font-size: 1.5rem;
            color: #2b6cb0;
            border-bottom: 2px solid #ebf8ff;
            padding-bottom: 8px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Profile Summary */
        .summary p {
            color: #4a5568;
        }

        /* Grid Layout for Skills and Career Interests */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        /* Lists formatting */
        ul {
            list-style-type: none;
        }

        ul li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 8px;
            color: #4a5568;
        }

        ul li::before {
            content: "•";
            color: #3182ce;
            font-weight: bold;
            font-size: 1.2rem;
            position: absolute;
            left: 0;
            top: -2px;
        }

            padding
